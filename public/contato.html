<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - KickStream</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="page-simple">
  <header class="site-header compact">
    <a class="logo" href="index.html">KickStream</a>
    <nav>
      <a href="index.html">Catálogo</a>
      <a href="sobre.html">Sobre</a>
      <a class="active" href="contato.html">Contato</a>
    </nav>
  </header>

  <main class="simple-card contact-card">
    <span class="eyebrow">Fale conosco</span>
    <h1>Contato</h1>
    <p>Envie uma mensagem para saber mais sobre o projeto KickStream ou sugerir novas partidas para o catálogo.</p>
    <form>
      <input placeholder="Seu nome" aria-label="Seu nome">
      <input placeholder="Seu e-mail" aria-label="Seu e-mail">
      <textarea placeholder="Mensagem" aria-label="Mensagem"></textarea>
      <button type="button">Enviar</button>
    </form>
    <a class="text-link" href="index.html">Voltar ao catálogo</a>
  </main>
</body>
</html>
